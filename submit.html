<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Files | TECH FÊTE 2K26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@100..700&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #050A18; color: white; }
        h1, h2, h3, .brand-font { font-family: 'Antonio', sans-serif; }
        
        /* Drag and Drop visual feedback */
        .drag-active { border-color: #f59e0b !important; background-color: rgba(245, 158, 11, 0.1) !important; transform: scale(1.02); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 relative">
    
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] bg-blue-900/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] bg-amber-900/10 blur-[150px] rounded-full"></div>
    </div>

    <div class="text-center mb-10 z-10 w-full max-w-lg relative mt-4">
        <a href="index.html" class="inline-flex items-center text-amber-500 hover:text-amber-400 text-xs font-bold uppercase tracking-widest mb-6 transition-colors bg-amber-500/10 px-4 py-2 rounded-full border border-amber-500/20">
            <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> Back to Home
        </a>
        <div class="w-16 h-16 md:w-20 md:h-20 bg-white rounded-xl p-1.5 flex items-center justify-center shadow-[0_0_15px_rgba(255,255,255,0.2)] mb-4 mx-auto">
            <img src="college_logo.jpg" alt="PJPII Logo" class="w-full h-full object-contain rounded-xl" onerror="this.style.display='none'">
        </div>
        <h1 class="brand-font text-4xl md:text-5xl font-black text-amber-500 tracking-wider">SUBMIT PORTAL</h1>
        <p class="text-slate-400 tracking-widest uppercase text-[10px] mt-2 font-bold">Tech Fête 2k26 Professional Upload</p>
    </div>

    <div class="w-full max-w-lg bg-slate-900/80 backdrop-blur-xl border border-amber-500/20 rounded-3xl shadow-[0_0_40px_rgba(0,0,0,0.8)] p-6 relative overflow-hidden z-10">
        
        <form id="upload-form" onsubmit="window.processFirebaseUpload(event)" class="flex flex-col space-y-6">
            
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Registration ID <span class="text-red-500">*</span></label>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-amber-500 font-bold tracking-widest font-mono">TF2K26-</span>
                    <input type="text" id="reg-id" required autocomplete="off" oninput="window.handleIdInput(this)" placeholder="NAME-0000" class="w-full bg-[#020617] border border-slate-700 rounded-xl py-3 pl-[88px] pr-10 text-white focus:outline-none focus:border-amber-500 uppercase tracking-widest font-mono text-sm shadow-inner transition-colors">
                    <div id="id-loading" class="absolute right-4 hidden"><i data-lucide="loader-2" class="w-4 h-4 text-amber-500 animate-spin"></i></div>
                    <div id="id-success" class="absolute right-4 hidden"><i data-lucide="check" class="w-5 h-5 text-emerald-500"></i></div>
                </div>
                <p id="id-message" class="text-[10px] text-slate-500 mt-1">Enter ID to load your registered events.</p>
            </div>

            <div id="event-container" class="opacity-50 pointer-events-none transition-opacity">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Select Event <span class="text-red-500">*</span></label>
                <select id="event-name" required onchange="window.updateFileConstraints()" class="w-full bg-[#020617] border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500 appearance-none">
                    <option value="" disabled selected>-- Awaiting valid ID --</option>
                    <!-- Options populated dynamically -->
                </select>
            </div>

            <div id="upload-area" class="opacity-50 pointer-events-none transition-opacity">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 flex justify-between">
                    <span>Upload File <span class="text-red-500">*</span></span>
                    <span id="file-sub-instruction" class="text-[10px] text-amber-500 font-bold lowercase tracking-normal"></span>
                </label>
                <div id="drop-zone" class="relative border-2 border-dashed border-slate-700 hover:border-amber-500 rounded-xl p-8 text-center transition-all duration-300 bg-[#020617] group cursor-pointer" onclick="document.getElementById('file-input').click()">
                    <i id="upload-icon" data-lucide="upload-cloud" class="w-10 h-10 mx-auto text-slate-500 group-hover:text-amber-400 mb-3 transition-colors pointer-events-none"></i>
                    <p id="file-instruction" class="text-sm font-bold text-white mb-1 pointer-events-none">Drag & drop or click to browse</p>
                    
                    <!-- Hidden Input -->
                    <input type="file" id="file-input" class="hidden" onchange="window.handleFileSelection(event)">
                </div>
                
                <div id="file-preview" class="hidden mt-4 bg-slate-800 p-4 rounded-xl flex items-center justify-between border border-slate-700 shadow-inner">
                    <div class="flex items-center overflow-hidden">
                        <i data-lucide="file-check" class="w-5 h-5 text-emerald-400 mr-3 shrink-0"></i>
                        <span id="file-name-display" class="text-xs font-bold truncate text-white tracking-wider"></span>
                    </div>
                    <button type="button" onclick="window.clearFile()" class="text-red-400 hover:text-red-500 ml-4 shrink-0 bg-black/20 p-1.5 rounded-lg transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
            </div>

            <button type="submit" id="submit-btn" disabled class="w-full bg-gradient-to-r from-amber-400 to-amber-600 text-slate-950 py-4 rounded-xl font-black uppercase tracking-widest transition-all shadow-[0_0_20px_rgba(245,158,11,0.3)] hover:brightness-110 disabled:opacity-50 flex items-center justify-center">
                Start Upload <i data-lucide="cloud-lightning" class="ml-2 w-5 h-5"></i>
            </button>

            <div id="loading-ui" class="hidden flex-col items-center justify-center py-4 text-center">
                <i data-lucide="loader-2" class="w-8 h-8 text-amber-500 animate-spin mb-3 mx-auto"></i>
                <p id="loading-text" class="text-xs font-bold text-amber-400 uppercase tracking-widest">Processing...</p>
                <div class="w-full bg-slate-800 rounded-full h-1.5 mt-4 overflow-hidden hidden" id="progress-bar-container">
                    <div class="bg-amber-500 h-full transition-all duration-300" id="progress-bar" style="width: 0%"></div>
                </div>
            </div>
        </form>

        <div id="success-screen" class="hidden flex-col items-center justify-center py-8 text-center">
            <div class="w-20 h-20 bg-emerald-500/10 text-emerald-500 rounded-full flex items-center justify-center mb-6 border border-emerald-500/20 shadow-[0_0_30px_rgba(16,185,129,0.2)]">
                <i data-lucide="check-circle" class="w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-black text-white brand-font tracking-wide mb-2 uppercase">Success!</h2>
            <p class="text-slate-400 mb-8 text-sm px-4">Your file has been uploaded.</p>
            <button onclick="location.reload()" class="w-full bg-slate-800 text-white px-6 py-4 rounded-xl font-black uppercase tracking-widest hover:bg-slate-700 transition-all">Upload Another File</button>
        </div>
    </div>

    <!-- SDK INCLUDES -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFBjp-cbaxm4byMLNSFUukHyw2AfSByss",
            authDomain: "tech-fete-2026.firebaseapp.com",
            projectId: "tech-fete-2026",
            storageBucket: "tech-fete-2026.firebasestorage.app",
            messagingSenderId: "588004541639",
            appId: "1:588004541639:web:e9c9d79bfd27d3242b6ae2",
            measurementId: "G-R67C2YD74F"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        signInAnonymously(auth).catch(console.error);

        window.fbStorage = { ref, uploadBytesResumable, getDownloadURL, storage };
        window.fbDB = { db, collection, query, where, getDocs, doc, setDoc };
    </script>

    <script>
        lucide.createIcons();
        let selectedFile = null;
        let currentUserDocId = null;
        let searchTimeout = null;

        // 1. Dynamic ID Verification & Event Loading
        window.handleIdInput = function(input) {
            // Keep input clean from TF2K26- as it's hardcoded visually
            let val = input.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
            if (val.startsWith("TF2K26-")) val = val.substring(7);
            input.value = val;
            
            const fullId = "TF2K26-" + val;

            clearTimeout(searchTimeout);
            
            const eventContainer = document.getElementById('event-container');
            const eventSelect = document.getElementById('event-name');
            const msg = document.getElementById('id-message');
            const loadIcon = document.getElementById('id-loading');
            const checkIcon = document.getElementById('id-success');
            
            window.clearFile();
            document.getElementById('upload-area').classList.add('opacity-50', 'pointer-events-none');

            // Reduced minimum length to 6 to support 1-letter first names (e.g., K-0009)
            if (val.length < 6) {
                eventContainer.classList.add('opacity-50', 'pointer-events-none');
                eventSelect.innerHTML = '<option value="" disabled selected>-- Enter full ID --</option>';
                msg.innerText = "Enter ID to load your registered events.";
                msg.className = "text-[10px] text-slate-500 mt-1";
                loadIcon.classList.add('hidden');
                checkIcon.classList.add('hidden');
                return;
            }

            // Show loading state
            loadIcon.classList.remove('hidden');
            checkIcon.classList.add('hidden');
            msg.innerText = "Verifying ID in cloud...";
            msg.className = "text-[10px] text-amber-500 mt-1 font-bold animate-pulse";

            // Debounce search
            searchTimeout = setTimeout(async () => {
                try {
                    const q = window.fbDB.query(window.fbDB.collection(window.fbDB.db, 'universal_attendees'), window.fbDB.where('regId', '==', fullId));
                    const snap = await window.fbDB.getDocs(q);
                    
                    loadIcon.classList.add('hidden');

                    if (snap.empty) { 
                        msg.innerText = "ID not found. Please verify your Registration ID.";
                        msg.className = "text-[10px] text-red-400 mt-1 font-bold";
                        eventContainer.classList.add('opacity-50', 'pointer-events-none');
                        eventSelect.innerHTML = '<option value="" disabled selected>-- ID Not Found --</option>';
                        return; 
                    }

                    const userDoc = snap.docs[0];
                    currentUserDocId = userDoc.id;
                    const userData = userDoc.data();
                    const registeredEvents = userData.events || [];

                    // Filter to strictly ONLY events that require file submissions
                    const submittableEventNames = ["PPT Presentation", "Tech Memes", "Techmeme", "Poster Making", "Dance", "Photography"];
                    const allowedEvents = registeredEvents
                        .map(e => e.eventName)
                        .filter(eventName => submittableEventNames.includes(eventName));

                    if (allowedEvents.length === 0) {
                        msg.innerText = "Valid ID, but no file uploads required for your registered events.";
                        msg.className = "text-[10px] text-amber-400 mt-1 font-bold";
                        eventContainer.classList.add('opacity-50', 'pointer-events-none');
                        eventSelect.innerHTML = '<option value="" disabled selected>-- No uploads needed --</option>';
                        return;
                    }

                    checkIcon.classList.remove('hidden');
                    msg.innerText = "ID Verified! Welcome, " + userData.name.split(" ")[0];
                    msg.className = "text-[10px] text-emerald-400 mt-1 font-bold tracking-widest uppercase";

                    // Populate Dropdown
                    eventContainer.classList.remove('opacity-50', 'pointer-events-none');
                    let optionsHtml = '<option value="" disabled selected>-- Select Your Event --</option>';
                    allowedEvents.forEach(ev => {
                        optionsHtml += `<option value="${ev}">${ev}</option>`;
                    });
                    eventSelect.innerHTML = optionsHtml;

                } catch (e) {
                    console.error(e);
                    loadIcon.classList.add('hidden');
                    msg.innerText = "Network error. Check connection.";
                    msg.className = "text-[10px] text-red-400 mt-1 font-bold";
                }
            }, 600); // 600ms debounce
        };

        // 2. Strict File Rules based on Event
        window.updateFileConstraints = function() {
            const ev = document.getElementById('event-name').value;
            const uploadArea = document.getElementById('upload-area');
            const fileInput = document.getElementById('file-input');
            const subInst = document.getElementById('file-sub-instruction');
            
            window.clearFile();
            if (!ev) return;
            
            uploadArea.classList.remove('opacity-50', 'pointer-events-none');
            
            if (ev === "Dance") { 
                fileInput.accept = ".mp3, .wav"; 
                subInst.innerHTML = "Accepts: <b>.MP3, .WAV</b> (Max 4 Mins)"; 
            }
            else if (ev === "PPT Presentation") { 
                fileInput.accept = ".ppt, .pptx, .pdf"; 
                subInst.innerHTML = "Accepts: <b>.PPT, .PPTX, .PDF</b>"; 
            }
            else if (ev === "Tech Memes" || ev === "Techmeme" || ev === "Poster Making" || ev === "Photography") { 
                fileInput.accept = ".jpg, .jpeg, .png, .zip"; 
                subInst.innerHTML = "Accepts: <b>.JPG, .PNG</b> or <b>.ZIP</b> (for multiples)"; 
            }
            else {
                // Fallback for unexpected events
                fileInput.accept = "*";
                subInst.innerHTML = "Max Size: 30MB";
            }
        };

        // 3. Drag & Drop Mechanics
        const dropZone = document.getElementById('drop-zone');
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults (e) { e.preventDefault(); e.stopPropagation(); }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-active'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-active'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            
            if (files.length > 1) {
                alert("Please drop only 1 file. If you have multiple files, compress them into a .ZIP first.");
                return;
            }
            
            if (files.length === 1) {
                // Manually trigger the validation workflow
                validateAndProcessFile(files[0]);
            }
        });

        // Manual File Selection wrapper
        window.handleFileSelection = function(event) {
            if (event.target.files.length === 0) return;
            validateAndProcessFile(event.target.files[0]);
        };

        // 4. Advanced Validation Logic
        function validateAndProcessFile(file) {
            const ev = document.getElementById('event-name').value;
            const ext = file.name.toLowerCase().split('.').pop();
            
            // Hard limit 30MB for ALL files to prevent browser crashing
            if (file.size > 30 * 1024 * 1024) { 
                alert(`⚠️ File is too large!\n\nYour file is ${(file.size/1024/1024).toFixed(1)}MB. Maximum limit is 30MB.`); 
                window.clearFile();
                return; 
            }

            // DANCE RULES: MP3/WAV, Max 4 Mins
            if (ev === "Dance") {
                if (ext !== 'mp3' && ext !== 'wav') {
                    alert("⚠️ Invalid Format for Dance!\n\nPlease upload a single .mp3 or .wav audio file.");
                    window.clearFile(); return;
                }
                
                // Read audio duration
                const audio = new Audio();
                audio.src = URL.createObjectURL(file);
                audio.onloadedmetadata = function() {
                    if (audio.duration > 241) { // Allow 1 second buffer (4 mins = 240s)
                        alert(`⚠️ Audio Time Limit Exceeded!\n\nYour track is ${(audio.duration/60).toFixed(2)} minutes long. The strict limit is 4 minutes.`);
                        window.clearFile();
                    } else {
                        window.acceptFile(file);
                    }
                };
                audio.onerror = function() {
                    alert("Error reading audio file. Please try another format.");
                    window.clearFile();
                };
                return; // Wait for async metadata
            }

            // PPT RULES: Only PDF/PPT
            else if (ev === "PPT Presentation") {
                if (ext !== 'ppt' && ext !== 'pptx' && ext !== 'pdf') {
                    alert("⚠️ Invalid Format for PPT!\n\nPlease upload exactly 1 .pdf, .ppt, or .pptx file.");
                    window.clearFile(); return;
                }
            }

            // CREATIVE RULES (Meme, Poster, Photo): Single IMG or ZIP
            else if (ev === "Tech Memes" || ev === "Techmeme" || ev === "Poster Making" || ev === "Photography") {
                if (ext !== 'jpg' && ext !== 'jpeg' && ext !== 'png' && ext !== 'zip') {
                    alert(`⚠️ Invalid Format for ${ev}!\n\nUpload a single image (.jpg, .png) OR if you have multiple images, compress them into a single .ZIP file and upload that.`);
                    window.clearFile(); return;
                }
            }

            // If passed all rules, accept it
            window.acceptFile(file);
        }

        window.acceptFile = function(file) {
            selectedFile = file;
            document.getElementById('file-name-display').innerText = file.name;
            document.getElementById('file-preview').classList.remove('hidden');
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('drop-zone').classList.add('border-emerald-500/50', 'bg-emerald-900/10');
            document.getElementById('upload-icon').classList.replace('text-slate-500', 'text-emerald-500');
            lucide.createIcons();
        };

        window.clearFile = function() {
            selectedFile = null;
            document.getElementById('file-input').value = "";
            document.getElementById('file-preview').classList.add('hidden');
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('drop-zone').classList.remove('border-emerald-500/50', 'bg-emerald-900/10');
            document.getElementById('upload-icon').classList.replace('text-emerald-500', 'text-slate-500');
        };

        window.processFirebaseUpload = async function(e) {
            e.preventDefault();
            const fullRegId = "TF2K26-" + document.getElementById('reg-id').value.trim().toUpperCase();
            const eventName = document.getElementById('event-name').value;
            const btn = document.getElementById('submit-btn');
            const loadUI = document.getElementById('loading-ui');
            const loadText = document.getElementById('loading-text');

            if (!selectedFile || !currentUserDocId) return;

            btn.classList.add('hidden');
            loadUI.classList.remove('hidden');
            loadUI.classList.add('flex');
            
            // Because ID is already verified locally, jump straight to upload
            loadText.innerText = "Initializing Secure Connection...";
            document.getElementById('progress-bar-container').classList.remove('hidden');
            
            try {
                const ext = selectedFile.name.split('.').pop();
                // FORMAT: RegNo_EventName.ext
                const cleanEventName = eventName.replace(/\s+/g, '_');
                const newName = `${fullRegId}_${cleanEventName}.${ext}`;
                const storagePath = `event_submissions/${cleanEventName}/${newName}`;
                
                const storageRef = window.fbStorage.ref(window.fbStorage.storage, storagePath);
                const uploadTask = window.fbStorage.uploadBytesResumable(storageRef, selectedFile);

                uploadTask.on('state_changed', 
                    (s) => {
                        const prog = (s.bytesTransferred / s.totalBytes) * 100;
                        document.getElementById('progress-bar').style.width = prog + '%';
                        loadText.innerText = `Uploading... ${Math.round(prog)}%`;
                    },
                    (err) => { 
                        console.error(err);
                        alert("Storage Error! Check your internet connection."); 
                        btn.classList.remove('hidden'); 
                        loadUI.classList.add('hidden');
                    },
                    async () => {
                        try {
                            const downloadURL = await window.fbStorage.getDownloadURL(uploadTask.snapshot.ref);
                            await window.fbDB.setDoc(window.fbDB.doc(window.fbDB.db, 'universal_attendees', currentUserDocId), {
                                submissions: {
                                    [eventName]: {
                                        fileName: newName,
                                        url: downloadURL,
                                        submittedAt: new Date().toISOString()
                                    }
                                }
                            }, { merge: true });
                        } catch (e) {
                            console.log("DB update bypassed.");
                        }

                        // Success Message Adjusted Here
                        document.getElementById('upload-form').classList.add('hidden');
                        document.getElementById('success-screen').classList.remove('hidden');
                        document.getElementById('success-screen').classList.add('flex');
                    }
                );
            } catch (err) {
                btn.classList.remove('hidden');
                loadUI.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
