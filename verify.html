<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner | Tech Fêté 2k26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@100..700&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #050A18; color: white; }
        h1, h2, h3, .brand-font { font-family: 'Antonio', sans-serif; }
        #reader { width: 100%; border-radius: 1rem; overflow: hidden; border: 2px solid rgba(245, 158, 11, 0.3); }
        #reader video { object-fit: cover; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 px-4">
    
    <div class="w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="brand-font text-3xl font-black text-amber-500 tracking-wider">EVENT SCANNER</h1>
            <p class="text-slate-400 uppercase text-[10px] tracking-[0.2em] font-bold mt-1">Tech Fête 2k26 Terminal</p>
        </div>

        <div id="auth-section" class="bg-slate-900/80 backdrop-blur-md p-6 rounded-3xl border border-amber-500/20 shadow-xl mb-6">
            <h2 class="text-xl font-bold mb-4 text-center">Coordinator Login</h2>
            <input type="password" id="pin-input" placeholder="Enter PIN" class="w-full bg-[#020617] border border-slate-700 rounded-xl px-4 py-3 text-center text-white focus:outline-none focus:border-amber-500 tracking-[0.5em] font-mono text-lg mb-4">
            <button onclick="window.verifyPin()" class="w-full bg-amber-500 text-slate-950 font-black py-3 rounded-xl uppercase tracking-widest hover:bg-amber-400">Unlock</button>
        </div>

        <div id="scanner-section" class="hidden">
            <button id="scan-btn" onclick="window.startScanner()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl uppercase tracking-widest mb-4 flex items-center justify-center shadow-[0_0_15px_rgba(37,99,235,0.4)] transition-all active:scale-95">
                <i data-lucide="camera" class="mr-2 w-5 h-5"></i> Start Scanner
            </button>

            <!-- REFINED MANUAL ENTRY FALLBACK -->
            <div id="manual-entry-ui" class="bg-black/40 backdrop-blur-xl p-5 rounded-3xl border border-slate-800 shadow-inner mb-6 relative overflow-hidden group hover:border-amber-500/30 transition-all duration-300">
                <div class="absolute top-0 right-0 w-32 h-32 bg-amber-500/5 rounded-bl-full -z-10 group-hover:scale-110 transition-transform duration-500"></div>
                <div class="flex items-center justify-center mb-3">
                     <span class="h-px w-8 bg-slate-700 mr-3"></span>
                     <p class="text-[10px] text-slate-400 uppercase font-black tracking-[0.2em]">Manual Entry</p>
                     <span class="h-px w-8 bg-slate-700 ml-3"></span>
                </div>
                <div class="flex gap-2 relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                         <i data-lucide="keyboard" class="w-4 h-4 text-slate-500"></i>
                    </div>
                    <input type="text" id="manual-id" placeholder="TF2K26-NAME-0000" class="w-full bg-[#020617] border border-slate-700 rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none focus:border-amber-500 font-mono text-sm uppercase tracking-wider shadow-[inset_0_2px_10px_rgba(0,0,0,0.5)]">
                    <button onclick="window.manualLookup()" class="bg-amber-500 hover:bg-amber-400 text-slate-950 px-5 rounded-xl font-bold transition-all shadow-[0_0_10px_rgba(245,158,11,0.2)] flex items-center justify-center shrink-0 active:scale-95">
                        <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- SCANNER UI -->
            <div id="scanner-ui" class="hidden bg-slate-900/80 p-4 rounded-3xl border border-amber-500/20 mb-6 shadow-2xl">
                <div class="flex justify-between items-center mb-3 px-2">
                    <span class="text-xs font-bold text-amber-500 uppercase tracking-widest flex items-center"><i data-lucide="scan" class="w-4 h-4 mr-2 animate-pulse"></i> Scanning...</span>
                    <button onclick="window.stopScanner()" class="text-slate-400 hover:text-red-400 transition-colors bg-slate-800 p-1.5 rounded-lg">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <div id="reader" class="mb-2 rounded-2xl overflow-hidden shadow-inner"></div>
            </div>

            <!-- PARTICIPANT PROFILE DISPLAY -->
            <div id="result-card" class="hidden bg-slate-900/90 backdrop-blur-xl border border-amber-500/30 rounded-3xl p-6 shadow-[0_0_40px_rgba(0,0,0,0.8)] relative overflow-hidden">
                 <div class="absolute top-0 right-0 w-32 h-32 bg-amber-500/5 rounded-bl-full -z-10 pointer-events-none"></div>
                <div id="result-content"></div>
            </div>
        </div>
    </div>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        lucide.createIcons();

        const firebaseConfig = {
            apiKey: "AIzaSyDFBjp-cbaxm4byMLNSFUukHyw2AfSByss",
            authDomain: "tech-fete-2026.firebaseapp.com",
            projectId: "tech-fete-2026",
            storageBucket: "tech-fete-2026.firebasestorage.app",
            messagingSenderId: "588004541639",
            appId: "1:588004541639:web:e9c9d79bfd27d3242b6ae2",
            measurementId: "G-R67C2YD74F"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ⚠️ PASTE YOUR GOOGLE SCRIPT WEBHOOK URL HERE
        const SHEET_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxJLGk5iaoioQSLhGVe8lXq4FQg3G-dOdjV4gK37P7KddEj48u9Z4S5O42uoldWbrU4-A/exec";

        signInAnonymously(auth).catch(console.error);

        let html5QrcodeScanner = null;
        let currentParticipantData = null;
        let currentParticipantPhoneId = null;

        window.verifyPin = function() {
            const pin = document.getElementById('pin-input').value;
            if (pin === "1024") {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('scanner-section').classList.remove('hidden');
            } else {
                alert("Incorrect PIN");
                document.getElementById('pin-input').value = '';
            }
        };

        // NEW SCANNER LOGIC: Forces rear camera automatically
        window.startScanner = function() {
            document.getElementById('scanner-ui').classList.remove('hidden');
            document.getElementById('scan-btn').classList.add('hidden');
            document.getElementById('manual-entry-ui').classList.add('hidden');
            document.getElementById('result-card').classList.add('hidden');
            
            html5QrcodeScanner = new Html5Qrcode("reader");
            
            // Bypass camera selection, force rear camera (environment) natively
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                {
                    fps: 10,
                    qrbox: { width: 250, height: 250 }
                },
                (decodedText) => {
                    // Success callback
                    html5QrcodeScanner.stop().then(() => {
                        document.getElementById('scanner-ui').classList.add('hidden');
                        document.getElementById('scan-btn').classList.remove('hidden');
                        document.getElementById('manual-entry-ui').classList.remove('hidden');
                        window.lookupParticipant(decodedText);
                    });
                },
                (errorMessage) => {
                    // ignore rapid scan errors silently
                }
            ).catch((err) => {
                console.error(err);
                alert("Camera error. Please ensure you are on a mobile device and have granted camera permissions.");
                document.getElementById('scanner-ui').classList.add('hidden');
                document.getElementById('scan-btn').classList.remove('hidden');
                document.getElementById('manual-entry-ui').classList.remove('hidden');
            });
        };

        window.stopScanner = function() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    document.getElementById('scanner-ui').classList.add('hidden');
                    document.getElementById('scan-btn').classList.remove('hidden');
                    document.getElementById('manual-entry-ui').classList.remove('hidden');
                });
            }
        };

        window.manualLookup = function() {
            const manualId = document.getElementById('manual-id').value.trim().toUpperCase();
            if(!manualId) return;
            window.lookupParticipant(manualId);
            document.getElementById('manual-id').value = ''; // clear input
        };

        // Handle enter key on manual input
        document.getElementById("manual-id").addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                window.manualLookup();
            }
        });

        // Handle enter key on login input
        document.getElementById("pin-input").addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                window.verifyPin();
            }
        });

        window.lookupParticipant = async function(scannedId) {
            const resultCard = document.getElementById('result-card');
            const resultContent = document.getElementById('result-content');
            
            resultCard.classList.remove('hidden');
            resultContent.innerHTML = `<div class="text-center py-8"><i data-lucide="loader-2" class="w-8 h-8 text-amber-500 animate-spin mx-auto mb-2"></i><p class="text-slate-400 text-sm mt-2 font-bold tracking-wide">Fetching cloud records...</p></div>`;
            lucide.createIcons();

            try {
                // Determine ID type
                let searchId = scannedId;
                let searchField = 'regId';
                
                // Backward compatibility if they scan phone number
                if (!scannedId.startsWith('TF2K26-')) {
                    searchId = "+91 " + scannedId.replace(/\D/g, '').substring(0, 10);
                    searchField = 'phone';
                    currentParticipantPhoneId = searchId.replace(/\D/g, '');
                } else {
                    // If they scanned a Reg ID, we need to find the phone number document name
                    const qRef = collection(db, 'universal_attendees');
                    const q = query(qRef, where("regId", "==", scannedId));
                    const querySnapshot = await getDocs(q);
                    
                    if (querySnapshot.empty) {
                        throw new Error("ID Not Found");
                    }
                    const docData = querySnapshot.docs[0].data();
                    currentParticipantPhoneId = docData.phone.replace(/\D/g, '');
                }

                // Get participant document
                const docRef = doc(db, 'universal_attendees', currentParticipantPhoneId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    currentParticipantData = docSnap.data();
                    // Fallback to ensure currentParticipantData.regId exists for legacy records
                    if (!currentParticipantData.regId) {
                        currentParticipantData.regId = scannedId;
                    }
                    window.renderParticipantProfile();
                } else {
                    throw new Error("Participant Not Found");
                }
            } catch (error) {
                resultContent.innerHTML = `
                    <div class="text-center py-6">
                        <div class="w-16 h-16 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-500/20">
                            <i data-lucide="x-circle" class="w-8 h-8"></i>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-2">Invalid Pass</h3>
                        <p class="text-slate-400 text-sm">This QR code or ID is not registered in the system.</p>
                        <button onclick="document.getElementById('result-card').classList.add('hidden')" class="mt-6 w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 rounded-xl text-sm transition-colors uppercase tracking-widest">Dismiss</button>
                    </div>
                `;
                lucide.createIcons();
            }
        };

        window.renderParticipantProfile = function() {
            const data = currentParticipantData;
            const checkIns = data.checkIns || {};
            const events = data.events || [];
            const resultContent = document.getElementById('result-content');

            // Gate Entry Logic
            const hasEnteredCampus = checkIns['Main Gate Entry'];
            let gateEntryHtml = ``;
            if (hasEnteredCampus) {
                gateEntryHtml = `
                    <div class="bg-emerald-900/20 border border-emerald-500/30 p-4 rounded-2xl flex items-center mb-4 shadow-sm">
                        <i data-lucide="check-circle-2" class="text-emerald-500 w-6 h-6 mr-3 shrink-0"></i>
                        <div>
                            <h4 class="text-emerald-400 font-bold text-sm">Main Gate Entry</h4>
                            <p class="text-emerald-500/70 text-[10px] font-bold tracking-wider">CHECKED IN: ${hasEnteredCampus}</p>
                        </div>
                    </div>
                `;
            } else {
                gateEntryHtml = `
                    <div class="bg-slate-800/50 border border-slate-700 p-4 rounded-2xl flex justify-between items-center mb-4 group hover:border-amber-500/30 transition-colors shadow-sm">
                        <div class="flex items-center">
                            <i data-lucide="shield-alert" class="text-amber-500 w-5 h-5 mr-3 shrink-0"></i>
                            <h4 class="text-white font-bold text-sm">Main Gate Entry</h4>
                        </div>
                        <button onclick="window.processCheckIn('Main Gate Entry', null, this)" class="bg-amber-500 hover:bg-amber-400 text-slate-950 px-4 py-2 rounded-lg text-xs font-black uppercase tracking-wider transition-colors shrink-0 shadow-[0_0_10px_rgba(245,158,11,0.2)] active:scale-95">
                            Check In
                        </button>
                    </div>
                `;
            }

            // Events Logic
            let eventsHtml = '';
            events.forEach((ev, idx) => {
                const isCheckedIn = checkIns[ev.eventName];
                
                if (isCheckedIn) {
                    eventsHtml += `
                        <div class="bg-emerald-900/10 border border-emerald-500/20 p-4 rounded-2xl flex items-center mb-3 shadow-sm">
                            <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center mr-3 shrink-0">
                                <i data-lucide="check" class="text-emerald-500 w-4 h-4"></i>
                            </div>
                            <div>
                                <h4 class="text-white font-bold text-sm">${ev.eventName}</h4>
                                <p class="text-emerald-500 text-[10px] font-bold tracking-wider mt-0.5">CHECKED IN: ${isCheckedIn}</p>
                            </div>
                        </div>
                    `;
                } else {
                    const safeEventString = encodeURIComponent(JSON.stringify(ev));
                    eventsHtml += `
                        <div class="bg-slate-800/50 border border-slate-700 p-4 rounded-2xl flex justify-between items-center mb-3 hover:border-blue-500/30 transition-colors shadow-sm">
                            <div class="flex items-start">
                                <i data-lucide="circle" class="text-slate-500 w-5 h-5 mr-3 mt-0.5 shrink-0"></i>
                                <div>
                                    <h4 class="text-white font-bold text-sm">${ev.eventName}</h4>
                                    <p class="text-slate-500 text-[10px] uppercase tracking-wider font-bold mt-0.5">${ev.type === 'Team' ? `Team: ${ev.teamName} (${ev.role})` : 'Solo Event'}</p>
                                </div>
                            </div>
                            <button onclick="window.processCheckIn('${ev.eventName}', decodeURIComponent('${safeEventString}'), this)" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-wider transition-colors shrink-0 shadow-[0_0_10px_rgba(37,99,235,0.2)] active:scale-95">
                                Check In
                            </button>
                        </div>
                    `;
                }
            });

            if(eventsHtml === '') eventsHtml = `<p class="text-slate-500 text-xs text-center my-4 p-4 border border-slate-800 rounded-xl bg-black/20 font-medium">No events registered for this participant.</p>`;

            resultContent.innerHTML = `
                <div class="text-center mb-6 relative z-10">
                    <div class="inline-block p-1 rounded-full bg-amber-500/20 mb-3 shadow-[0_0_20px_rgba(245,158,11,0.15)]">
                        <div class="w-16 h-16 bg-gradient-to-br from-amber-400 to-amber-600 rounded-full flex items-center justify-center text-slate-950 font-black text-2xl">
                            ${data.name.charAt(0).toUpperCase()}
                        </div>
                    </div>
                    <h2 class="text-2xl font-black text-white tracking-wide">${data.name}</h2>
                    <p class="text-amber-400 text-sm font-bold mt-1">${data.college}</p>
                    <p class="text-slate-400 text-xs font-mono mt-2 tracking-widest border border-slate-700/50 inline-block px-4 py-1.5 rounded-lg bg-[#020617] shadow-inner font-bold"><span class="text-amber-500/50">#</span> ${data.regId}</p>
                </div>

                <div class="mb-6 relative z-10">
                    <h3 class="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em] mb-3 flex items-center border-b border-slate-800 pb-2"><i data-lucide="clipboard-check" class="w-3 h-3 mr-2"></i> Attendance Checklist</h3>
                    ${gateEntryHtml}
                    ${eventsHtml}
                </div>

                <button onclick="document.getElementById('result-card').classList.add('hidden');" class="relative z-10 w-full bg-slate-800 text-slate-300 font-bold py-4 rounded-xl text-xs tracking-widest uppercase hover:bg-slate-700 transition-colors flex items-center justify-center active:scale-95">
                     <i data-lucide="x" class="w-4 h-4 mr-2"></i> Close Profile
                </button>
            `;
            lucide.createIcons();
        };

        window.processCheckIn = async function(eventName, eventDetailsString, btnElement) {
            const originalText = btnElement.innerHTML;
            btnElement.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>`;
            btnElement.disabled = true;
            btnElement.classList.replace('bg-amber-500', 'bg-slate-600');
            btnElement.classList.replace('bg-blue-600', 'bg-slate-600');
            lucide.createIcons();

            const timeNow = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Kolkata' });
            const timestampFull = new Date().toISOString();
            
            let eventDetails = null;
            if (eventDetailsString) {
                eventDetails = JSON.parse(eventDetailsString);
            }

            try {
                // 1. Update Firebase Check-ins Map
                const docRef = doc(db, 'universal_attendees', currentParticipantPhoneId);
                await setDoc(docRef, { checkIns: { [eventName]: timeNow } }, { merge: true });

                // 2. Log to global attendance list (with Solo Fallbacks)
                await addDoc(collection(db, "attendance_logs"), {
                    timestamp: timestampFull,
                    checkInTime: new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Kolkata' }),
                    regId: currentParticipantData.regId || "N/A", 
                    primaryName: currentParticipantData.name,
                    college: currentParticipantData.college || "N/A",
                    phone: currentParticipantPhoneId,
                    type: eventDetails ? (eventDetails.type || "Solo") : "Campus Entry",
                    eventsCheckedIn: eventName,
                    teamName: eventDetails ? (eventDetails.teamName || "N/A") : "N/A",
                    role: eventDetails ? (eventDetails.role || "Solo") : "N/A"
                });

                // 3. Update Google Sheets via Master Webhook
                if (SHEET_WEBHOOK_URL.includes("script.google.com")) {
                    const sheetPayload = {
                        action: "checkin",
                        eventName: eventName,
                        regId: currentParticipantData.regId, // Critical: Send the Reg ID to match row
                        name: currentParticipantData.name,
                        college: currentParticipantData.college
                    };

                    await fetch(SHEET_WEBHOOK_URL, {
                        method: 'POST', mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(sheetPayload)
                    }).catch(err => console.error("Sheet Error:", err));
                }

                // Success update local UI
                if (!currentParticipantData.checkIns) currentParticipantData.checkIns = {};
                currentParticipantData.checkIns[eventName] = timeNow;
                window.renderParticipantProfile();

            } catch (error) {
                console.error(error);
                alert("Network error: Could not complete check-in.");
                btnElement.innerHTML = originalText;
                btnElement.disabled = false;
                btnElement.classList.replace('bg-slate-600', eventName === 'Main Gate Entry' ? 'bg-amber-500' : 'bg-blue-600');
            }
        };
    </script>
</body>
</html>
