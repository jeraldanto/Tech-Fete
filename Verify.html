<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Verification | Tech Fêté 2k26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@100..700&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #050A18; color: white; }
        h1, h2, h3, .brand-font { font-family: 'Antonio', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">
    <div class="text-center mb-8">
        <h1 class="brand-font text-4xl md:text-5xl font-black text-amber-500 tracking-wider">VERIFICATION PORTAL</h1>
        <p class="text-slate-400 tracking-widest uppercase text-xs mt-2 font-bold">Tech Fêté 2k26 Scanner</p>
    </div>

    <div id="data-container" class="w-full max-w-lg bg-slate-900 border border-amber-500/20 rounded-3xl shadow-2xl p-6 md:p-10 text-center relative overflow-hidden">
        <!-- Loading State -->
        <div id="loading-state" class="py-10">
            <div class="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-slate-400 font-bold uppercase tracking-widest text-sm animate-pulse" id="loading-text">Connecting to Cloud...</p>
        </div>

        <!-- Error State -->
        <div id="error-state" class="hidden py-10">
            <div class="text-red-500 text-5xl mb-4">⚠️</div>
            <h2 class="text-2xl font-bold mb-2">Scanner Error</h2>
            <p id="error-msg" class="text-red-400 text-sm mb-6 bg-red-900/20 p-4 rounded-lg"></p>
            <button onclick="window.location.reload()" class="bg-slate-800 text-white px-6 py-3 font-bold uppercase tracking-widest rounded-xl hover:bg-slate-700 transition-colors">Try Again</button>
        </div>

        <!-- Result State -->
        <div id="result-state" class="hidden text-left">
            <div id="ticket-header" class="mb-6 border-b border-slate-800 pb-6"></div>
            <div id="ticket-details" class="space-y-4 mb-8"></div>
            <div class="border-t border-slate-800 pt-6">
                <div id="attendance-status" class="mb-6 font-bold text-center text-lg flex flex-col items-center justify-center"></div>
                <button id="mark-btn" onclick="markAttendance()" class="w-full py-4 rounded-xl font-black text-lg transition-all shadow-xl uppercase tracking-widest hidden flex justify-center items-center">
                    Mark as Attended
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Your exact Firebase keys
        const firebaseConfig = {
            apiKey: "AIzaSyDFBjp-cbaxm4byMLNSFUukHyw2AfSByss",
            authDomain: "tech-fete-2026.firebaseapp.com",
            projectId: "tech-fete-2026",
            storageBucket: "tech-fete-2026.firebasestorage.app",
            messagingSenderId: "588004541639",
            appId: "1:588004541639:web:e9c9d79bfd27d3242b6ae2",
            measurementId: "G-R67C2YD74F"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentDocRef = null;
        let isAttended = false;
        
        // Global variables for attendance logging
        window.currentTicketData = null;
        window.currentTicketId = null;

        const urlParams = new URLSearchParams(window.location.search);
        const pid = urlParams.get('pid');
        const teamId = urlParams.get('team');

        window.showError = function(msg) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('result-state').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');
            document.getElementById('error-msg').innerText = msg;
        }

        async function init() {
            try {
                document.getElementById('loading-text').innerText = "Logging in securely...";
                await signInAnonymously(auth);

                if (pid) {
                    document.getElementById('loading-text').innerText = "Fetching Individual Ticket...";
                    await fetchTicket('individual_tickets', pid, 'Individual Pass');
                } else if (teamId) {
                    document.getElementById('loading-text').innerText = "Fetching Team Ticket...";
                    await fetchTicket('team_tickets', teamId, 'Team Pass');
                } else {
                    showError("Invalid QR Code Link. No Ticket ID found in the URL.");
                }
            } catch (err) {
                showError("Connection Error: " + err.message);
                console.error(err);
            }
        }

        async function fetchTicket(collectionName, documentId, passType) {
            try {
                currentDocRef = doc(db, collectionName, documentId);
                const snap = await getDoc(currentDocRef);

                if (!snap.exists()) {
                    showError("Ticket not found! It may be fake or deleted from the database.");
                    return;
                }

                const data = snap.data();
                
                // Store data for logging later
                window.currentTicketData = data;
                window.currentTicketId = documentId;
                
                isAttended = data.attended || false;

                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('result-state').classList.remove('hidden');

                document.getElementById('ticket-header').innerHTML = `
                    <h2 class="text-3xl font-black text-amber-500 brand-font">${passType}</h2>
                    <p class="text-xs text-slate-500 font-mono tracking-widest mt-1">ID: ${documentId}</p>
                `;

                let detailsHtml = '';
                if (pid) {
                    detailsHtml = `
                        <div class="bg-black/40 p-4 rounded-xl border border-slate-800">
                            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-1">Participant Name</p>
                            <p class="text-white font-bold text-lg">${data.name || 'Unknown'}</p>
                        </div>
                        <div class="bg-black/40 p-4 rounded-xl border border-slate-800">
                            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-1">College</p>
                            <p class="text-white font-bold">${data.college || 'Unknown'}</p>
                        </div>
                        <div class="bg-black/40 p-4 rounded-xl border border-slate-800">
                            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-1">Registered Events</p>
                            <div class="flex flex-wrap gap-2 mt-2">
                                ${(data.events || []).map(e => `<span class="bg-blue-500/20 text-blue-400 border border-blue-500/30 px-3 py-1 rounded-full text-xs font-bold">${e}</span>`).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    detailsHtml = `
                        <div class="bg-black/40 p-4 rounded-xl border border-slate-800">
                            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-1">Event Name</p>
                            <p class="text-amber-400 font-bold text-lg">${data.eventName || 'Unknown'}</p>
                        </div>
                        <div class="bg-black/40 p-4 rounded-xl border border-slate-800">
                            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-1">Team Name & Leader</p>
                            <p class="text-white font-bold text-lg">${data.teamName || 'Unknown Team'}</p>
                            <p class="text-slate-400 text-sm mt-1">Leader: ${data.leaderName || 'Unknown'}</p>
                        </div>
                        <div class="bg-black/40 p-4 rounded-xl border border-slate-800">
                            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-1">Other Members</p>
                            <p class="text-slate-300 text-sm leading-relaxed">${data.members && data.members.length > 0 ? data.members.join(', ') : 'None'}</p>
                        </div>
                    `;
                }

                document.getElementById('ticket-details').innerHTML = detailsHtml;
                updateAttendanceUI();

            } catch (error) {
                showError("Database Error: " + error.message);
            }
        }

        function updateAttendanceUI() {
            const statusEl = document.getElementById('attendance-status');
            const btn = document.getElementById('mark-btn');

            if (isAttended) {
                const checkInTime = window.currentTicketData.checkInTime || 'Unknown Time';
                statusEl.innerHTML = `
                    <span class="text-emerald-500 mb-1">✅ ALREADY CHECKED-IN</span>
                    <span class="text-xs text-slate-400 font-normal">Verified at: ${checkInTime}</span>
                `;
                statusEl.className = "mb-6 font-black text-center text-xl bg-emerald-500/10 p-4 rounded-xl border border-emerald-500/20 flex flex-col items-center justify-center";
                btn.classList.add('hidden');
            } else {
                statusEl.innerHTML = `<span class="text-amber-500">⏳ WAITING FOR CHECK-IN</span>`;
                statusEl.className = "mb-6 font-black text-center text-xl bg-amber-500/10 p-4 rounded-xl border border-amber-500/20 flex flex-col items-center justify-center";
                btn.classList.remove('hidden');
                btn.classList.add('bg-amber-500', 'text-slate-950', 'hover:brightness-110');
            }
        }

        window.markAttendance = async function() {
            // Note: The PIN is 2026.
            const pin = prompt("Enter Admin PIN to mark attendance:");
            if (pin !== "2026") {
                alert("Incorrect PIN!");
                return;
            }

            const btn = document.getElementById('mark-btn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            const timeNowString = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });

            try {
                // 1. Update the original ticket to mark it as attended
                await updateDoc(currentDocRef, {
                    attended: true,
                    checkInTime: timeNowString
                });
                
                // 2. NEW FEATURE: Log this event into a completely separate "attendance_logs" collection
                const logData = {
                    ticketId: window.currentTicketId,
                    type: pid ? 'Individual' : 'Team',
                    primaryName: window.currentTicketData.name || window.currentTicketData.leaderName || 'Unknown',
                    college: window.currentTicketData.college || 'N/A',
                    eventsCheckedIn: pid ? (window.currentTicketData.events || []).join(", ") : window.currentTicketData.eventName,
                    teamName: window.currentTicketData.teamName || 'N/A',
                    checkInTime: timeNowString,
                    timestamp: new Date().getTime() // for exact sorting in Firebase
                };
                
                await addDoc(collection(db, 'attendance_logs'), logData);

                // Update Local UI
                isAttended = true;
                window.currentTicketData.checkInTime = timeNowString;
                updateAttendanceUI();
                
            } catch (err) {
                console.error(err);
                alert("Failed to update database: " + err.message);
                btn.innerText = "Mark as Attended";
                btn.disabled = false;
            }
        };

        window.addEventListener('load', init);
    </script>
</body>
</html>
